<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Clock circle -->
  <circle cx="256" cy="256" r="150" stroke="white" stroke-width="20" fill="none" opacity="0.95"/>

  <!-- Clock center dot -->
  <circle cx="256" cy="256" r="14" fill="white"/>

  <!-- Hour hand (pointing to 10) -->
  <line x1="256" y1="256" x2="210" y2="186" stroke="white" stroke-width="18" stroke-linecap="round"/>

  <!-- Minute hand (pointing to 2) -->
  <line x1="256" y1="256" x2="310" y2="176" stroke="white" stroke-width="12" stroke-linecap="round"/>
</svg>
